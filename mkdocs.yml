site_name: pytruenas
site_description: A lean TrueNAS middleware (JSON-RPC over websocket) client and a pathlib interface for remote TrueNAS filesystems.
site_url: https://jose-pr.github.io/pytruenas/
repo_url: https://github.com/jose-pr/pytruenas
repo_name: jose-pr/pytruenas
edit_uri: edit/main/docs/

# Constrain the scan to docs/ so pymdownx.snippets + strict nav don't trip on
# repo-level markdown.
docs_dir: docs

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - content.code.copy

nav:
  - Home: index.md
  - Guide:
      - Connecting: guide/connecting.md
      - The API namespace: guide/api.md
      - Filesystem paths: guide/filesystem.md
      - Running commands: guide/commands.md
      - CLI: guide/cli.md
      - Generating typings: guide/typings.md
  - API Reference:
      - Overview: api/reference.md
      - Client: api/client.md
      - Namespace: api/namespace.md
      - JSON-RPC: api/jsonrpc.md
      - Auth: api/auth.md
      - Filesystem: api/fs.md
  - Changelog: changelog.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true
            show_root_heading: true
            merge_init_into_class: true
            show_if_no_docstring: true

markdown_extensions:
  - admonition
  - tables
  - pymdownx.snippets:
      base_path: ["."]
  - pymdownx.superfences
