name: Test

# On-demand test workflow. Trigger via:
#   - workflow_dispatch (optionally against a specific ref), for manual runs;
#   - push of a "ci-*" tag (throwaway; delete after), so a run can be triggered
#     + polled via the API/CLI without dashboard access.
# Not run on every branch push by default.
on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to test (branch, tag, or SHA)"
        required: false
        default: ""
  push:
    tags:
      - "ci-*"

permissions:
  contents: read

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (py${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.9", "3.13"]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (all extras + dev)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,config,ssh,codegen,host]"
      - name: Run tests
        run: python -m pytest -q

  benchmark:
    # Perf numbers for release notes come from here, not a developer laptop.
    # Single fixed runner + interpreter so results stay comparable across runs.
    name: Benchmark (py${{ matrix.python-version }}, ubuntu)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.13"]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        run: python -m pip install -e ".[dev]"
      - name: Run benchmarks
        run: python benchmarks/run.py --save --name "pytruenas-ci-py${{ matrix.python-version }}"
      - name: Upload benchmark result
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-py${{ matrix.python-version }}
          path: benchmarks/results/*.json

  docs:
    # The release workflow gates its Pages deploy on `mkdocs build --strict`.
    # Run the same check here so a docs break is caught before a tag is cut,
    # not halfway through an irreversible release.
    name: Build documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install package with docs tooling
        run: python -m pip install -e ".[dev,docs]"
      - name: Build docs
        run: mkdocs build --strict
