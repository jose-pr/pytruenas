name: Test

# On-demand test workflow. Trigger via:
#   - workflow_dispatch (optionally against a specific ref), for manual runs;
#   - push of a "ci-*" tag (throwaway; delete after), so a run can be triggered
#     + polled via the API/CLI without dashboard access.
# Not run on every branch push by default.
on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to test (branch, tag, or SHA)"
        required: false
        default: ""
  push:
    tags:
      - "ci-*"

permissions:
  contents: read

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (py${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.9", "3.13"]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (all extras + dev)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,config,ssh,codegen,host]"
      - name: Run tests
        run: python -m pytest -q
