name: Release

# Runs when a version tag (e.g. v0.1.0, v0.1.0-rc.1) is pushed. This is the
# release gate, not general CI. Publishing to PyPI uses Trusted Publishing
# (OIDC) -- PREREQUISITE: configure a "pypi" GitHub environment and register
# this repo as a trusted publisher for the `pytruenas` PyPI project first.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  test:
    name: Test (py${{ matrix.python-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.9", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package with all extras
        run: python -m pip install -e ".[dev,config,ssh,codegen,host]"
      - name: Run tests
        run: python -m pytest -q

  build:
    name: Build distribution
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install build tooling
        run: python -m pip install --upgrade build
      - name: Build sdist and wheel
        run: python -m build
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  github-release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Extract CHANGELOG.md section for this tag
        shell: python
        run: |
          import pathlib
          import re
          import sys

          tag = "${{ github.ref_name }}"
          version = tag[1:] if tag.startswith("v") else tag

          changelog = pathlib.Path("CHANGELOG.md").read_text(encoding="utf-8")
          match = re.search(
              rf"^## \[{re.escape(version)}\][^\n]*\n(.*?)(?=^## \[|^\[[^\]]+\]:\s|\Z)",
              changelog,
              re.DOTALL | re.MULTILINE,
          )
          if not match:
              sys.exit(f"No CHANGELOG.md section found for version {version!r}")
          pathlib.Path("release_notes.md").write_text(match.group(1).strip() + "\n", encoding="utf-8")
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          body_path: release_notes.md

  publish-pypi:
    name: Publish to PyPI
    needs: github-release
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/pytruenas/
    permissions:
      id-token: write # required for PyPI Trusted Publishing (OIDC)
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
